  <path d="M540 650 H1380" fill="none" stroke="#d9dfef" stroke-width="2"/>

  <a href="__PROJECT_URL__" target="_blank">
    <rect x="__QR_BOX_X__" y="700" width="220" height="220" rx="4" fill="#ffffff" stroke="#d9dfef" stroke-width="2"/>
    <g transform="translate(__QR_TRANSLATE_X__ 720) scale(__QR_SCALE__)" shape-rendering="crispEdges">
