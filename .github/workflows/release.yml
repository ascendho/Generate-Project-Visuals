name: Release Skill

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r plugins/generate-github-cover/skills/generate-github-cover/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Compile Python sources
        run: |
          python -m py_compile \
            plugins/generate-github-cover/skills/generate-github-cover/scripts/*.py \
            tools/package_skill.py

      - name: Validate and smoke-test rendering
        run: |
          python tools/package_skill.py "$GITHUB_REF_NAME" --check-only
          python plugins/generate-github-cover/skills/generate-github-cover/scripts/render_cover.py render \
            assets/generate-project-visuals-cover.json \
            --output-dir /tmp/generate-project-visuals-release
          python plugins/generate-github-cover/skills/generate-github-cover/scripts/render_cover.py validate \
            assets/generate-project-visuals-cover.json \
            --output-dir /tmp/generate-project-visuals-release
          python plugins/generate-github-cover/skills/generate-github-cover/scripts/render_logo.py validate \
            --style clean-geometric \
            --slug generate-project-visuals \
            --output-dir assets
          test -z "$(find assets -maxdepth 1 -name '*.svg' -print -quit)"

      - name: Build release archive
        run: python tools/package_skill.py "$GITHUB_REF_NAME"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "dist/generate-github-cover-$GITHUB_REF_NAME.zip" \
            "dist/generate-github-cover-$GITHUB_REF_NAME.zip.sha256" \
            --verify-tag \
            --generate-notes \
            --title "Generate Project Visuals $GITHUB_REF_NAME"
